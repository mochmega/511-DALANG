# ==============================================
# CI/CD Pipeline — Gudang Berkas (511 DALANG)
# ==============================================
# Alur kerja (workflow) pengujian otomatis ini berjalan setiap kali ada push atau PR ke main.
# Alur kerja ini akan melakukan:
#   1. Menyiapkan lingkungan (environment) Python
#   2. Menginstal pustaka ketergantungan (dependencies)
#   3. Menjalankan rangkaian unit pengujian (pytest)
#   4. Melaporkan hasil pengujian pada tab "Actions" GitHub

name: "CI — Backend Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: "Run Backend Tests"
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout kode dari repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      # 3.2 Check for vulnerabilities (CVEs)
      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt

      # 3.5 Run migrations
      - name: Run migrations
        env:
          JWT_SECRET_KEY: "ci-test-secret-key-12345"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD: "admin"
        run: |
          python -m alembic upgrade head

      # 4. Run test suite
      - name: Run pytest
        env:
          JWT_SECRET_KEY: "ci-test-secret-key-12345"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD: "admin"
          ALLOWED_ORIGINS: "http://localhost:5173"
          JWT_ACCESS_TOKEN_EXPIRES: "3600"
        run: |
          python -m pytest tests/test_api.py -v --tb=short
