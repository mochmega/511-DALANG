# ==============================================
# CI/CD Pipeline — Gudang Berkas (511 DALANG)
# ==============================================
# Robot ini akan otomatis berjalan setiap kali ada push ke main.
# Dia akan:
#   1. Setup Python environment
#   2. Install dependencies
#   3. Jalankan test suite (pytest)
#   4. Laporkan hasilnya di tab "Actions" GitHub

name: "CI — Backend Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Run Backend Tests"
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode dari repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Setup environment variables for testing
      - name: Setup test environment
        run: |
          echo "JWT_SECRET_KEY=ci-test-secret-key-12345" > .env
          echo "ADMIN_USERNAME=admin" >> .env
          echo "ADMIN_PASSWORD=admin" >> .env
          echo "ALLOWED_ORIGINS=http://localhost:5173" >> .env
          echo "JWT_ACCESS_TOKEN_EXPIRES=3600" >> .env

      # 5. Run test suite
      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short
