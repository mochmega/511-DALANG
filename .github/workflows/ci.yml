# ==============================================
# CI/CD Pipeline — Gudang Berkas (511 DALANG)
# ==============================================
# Robot ini akan otomatis berjalan setiap kali ada push ke main.
# Dia akan:
#   1. Setup Python environment
#   2. Install dependencies
#   3. Jalankan test suite (pytest)
#   4. Laporkan hasilnya di tab "Actions" GitHub

name: "CI — Backend Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Run Backend Tests"
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout kode dari repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 3.5 Run migrations
      - name: Run migrations
        env:
          JWT_SECRET_KEY: "ci-test-secret-key-12345"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD: "admin"
        run: |
          python -m alembic upgrade head

      # 4. Run test suite
      - name: Run pytest
        env:
          JWT_SECRET_KEY: "ci-test-secret-key-12345"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD: "admin"
          ALLOWED_ORIGINS: "http://localhost:5173"
          JWT_ACCESS_TOKEN_EXPIRES: "3600"
        run: |
          python -m pytest tests/test_api.py -v --tb=short

      # 5. Run E2E Test Suite
      - name: Run E2E Tests
        env:
          JWT_SECRET_KEY: "ci-test-secret-key-12345"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD: "admin"
          ALLOWED_ORIGINS: "http://localhost:5173"
          JWT_ACCESS_TOKEN_EXPIRES: "3600"
          PYTHONIOENCODING: "utf-8"
        run: |
          python tests/test_e2e_full.py
